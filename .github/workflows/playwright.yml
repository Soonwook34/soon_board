name: Playwright e2e

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    name: chromium e2e (smoke + visual + 10min memory)
    runs-on: ubuntu-latest
    # 본 단계는 인프라 도입 phase — Linux 환경 visual baseline 부재 시 first run fail 가능
    # (darwin baseline 만 commit). 다른 워크플로 blocking 방지 위해 best-effort.
    # 안정화 후 (Linux baseline 도 commit 된 후) false 로 전환할 것 — issue tracking 필요.
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: pw-version
        run: |
          version=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Chromium (cache miss only)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install OS deps (cache hit branch)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run e2e (excludes @long)
        run: npm run e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14

      - name: Upload generated snapshots (Linux baseline rescue)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-snapshots-linux
          path: e2e/**/*-snapshots/*.png
          retention-days: 14
          if-no-files-found: ignore
