# Daily data refresh — main-page-implementation.md §12 단계 12 + deployment-architecture.md §3.1.
# 3종 데이터(시즌 카탈로그 · race distance · 서킷 맵)를 1 workflow + 1 commit으로 갱신.
# race-distance와 circuit-maps 스크립트는 dashboard-implementation.md / live-map-implementation.md
# 책임이라 현재 미존재 — hashFiles 가드로 skip해서 시즌 카탈로그 step만 단독 동작.
# 후속 phase가 스크립트 추가하면 자동 활성화.

name: Daily Data Refresh

on:
  schedule:
    - cron: '0 1 * * *'    # 매일 01:00 UTC (OpenF1 자정 갱신 + 1h)
  workflow_dispatch:        # 수동 트리거 허용

permissions:
  contents: write

# critic M2: workflow_dispatch 남용 + cron 중첩 방지.
# 진행 중인 cron은 끝까지 진행, 새 트리거는 큐잉.
concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # 1) 시즌 카탈로그 — main-page-implementation.md §3.2 (가용 시즌 전체 일괄 빌드)
      - name: Fetch season catalog (all known seasons)
        run: npx tsx scripts/fetch-season-catalog.ts --all

      # 2) race distance — dashboard-implementation.md §2.2
      # 스크립트가 존재할 때만 실행 (현재 미구현 → skip).
      - name: Fetch race distance
        if: hashFiles('scripts/fetch-race-distance.ts') != ''
        run: npx tsx scripts/fetch-race-distance.ts

      # 3) circuit maps — live-map-implementation.md §1.3 (일요일에만)
      # 스크립트가 존재할 때만 weekday 감지 + fetch 실행 (둘 다 같이 skip 되어 로그 직관성 ↑).
      - name: Check weekday for circuit maps
        if: hashFiles('scripts/fetch-circuit-maps.ts') != ''
        id: weekday
        run: |
          if [ "$(date -u +%u)" = "7" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Fetch circuit maps (Sunday only)
        if: steps.weekday.outputs.run == 'true' && hashFiles('scripts/fetch-circuit-maps.ts') != ''
        run: |
          npx tsx scripts/fetch-circuit-maps.ts
          npx tsx scripts/extract-openf1-transform.ts
          npx tsx scripts/trace-pitlane.ts

      # 4) 통합 commit (1회) — Vercel은 main push 감지 시 자동 재배포 (별도 설정 불필요).
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/seasons/ public/raceDistance.json public/trackOutlines/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "data: daily refresh"
          git push
